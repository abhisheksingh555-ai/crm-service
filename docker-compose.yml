version: "3.9"

services:

  app:
    build: .
    container_name: crm-service

    ports:
      - "5000:5000"

    env_file:
      - .env

    depends_on:
      - mongodb
      - redis

  mongodb:
    image: mongo:8

    container_name: crm-mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:8

    container_name: crm-redis

    ports:
      - "6379:6379"

volumes:

  mongo-data: